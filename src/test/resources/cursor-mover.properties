# Start and end time for moving the cursor.
# Date/time format: yyyy-MM-dd HH:mm:ss
#cursor.mover.start=2026-06-12 04:00:00
#cursor.mover.end=2026-06-12 17:30:00

# Time interval in milliseconds for moving the cursor.
cursor.mover.interval.ms=10000

# Number of pixels to move the cursor at each interval.
cursor.mover.move.pixels=30
